<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa 2026 - Elencos das Seleções</title>
    <style>
        :root {
            --primary: #004d99;
            --secondary: #f4f4f4;
            --accent: #ffcc00;
            --text: #333;
            --white: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--secondary);
            color: var(--text);
        }

        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        main {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .controls {
            margin-bottom: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: var(--accent);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .team-section {
            background: var(--white);
            border-radius: 8px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .team-header {
            background: var(--primary);
            color: var(--white);
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
            display: none; /* Começa escondido como uma "pasta" fechada */
        }

        .player-grid.active {
            display: grid;
        }

        .player-card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            padding: 15px;
            transition: box-shadow 0.3s;
        }

        .player-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .player-photo {
            width: 120px;
            height: 120px;
            border-radius: 8px; /* Quadrado com cantos arredondados costuma enquadrar melhor */
            background-color: #eee;
            margin-bottom: 10px;
            object-fit: cover;
            object-position: top; /* Foca no topo da imagem (cabeça/rosto) */
            border: 2px solid var(--primary);
        }

        .player-name {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .player-info {
            font-size: 0.9rem;
            color: #666;
        }

        .loader {
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <h1>🏆 FIFA World Cup 2026 - Seleções</h1>
</header>

<main>
    <div class="controls">
        <button id="loadBtn">Carregar Seleções</button>
    </div>

    <div id="content">
        <!-- As seleções aparecerão aqui -->
    </div>
</main>

<script>
    const loadBtn = document.getElementById('loadBtn');
    const content = document.getElementById('content');

    // Lista extraída do seu CSV (Poderia ser um fetch no arquivo se estivesse em um servidor)
    const selecoes = [
        {id: 43883, nome: "África do Sul"},
        {id: 43888, nome: "Tunísia"},
        {id: 43899, nome: "Canadá"},
        {id: 43908, nome: "Haiti"},
        {id: 43911, nome: "México"},
        {id: 43914, nome: "Panamá"},
        {id: 43921, nome: "EUA"},
        {id: 43922, nome: "Argentina"},
        {id: 43924, nome: "Brasil"},
        {id: 43926, nome: "Colômbia"},
        {id: 43927, nome: "Equador"},
        {id: 43928, nome: "Paraguai"},
        {id: 43930, nome: "Uruguai"},
        {id: 43934, nome: "Áustria"},
        {id: 43935, nome: "Bélgica"},
        {id: 43938, nome: "Croácia"},
        {id: 43942, nome: "Inglaterra"},
        {id: 43946, nome: "França"},
        {id: 43948, nome: "Alemanha"},
        {id: 43960, nome: "Holanda"},
        {id: 43961, nome: "Noruega"},
        {id: 43963, nome: "Portugal"},
        {id: 43967, nome: "Escócia"},
        {id: 43969, nome: "Espanha"},
        {id: 43970, nome: "Suécia"},
        {id: 43971, nome: "Suíça"},
        {id: 43972, nome: "Turquia"},
        {id: 43976, nome: "Austrália"},
        {id: 43978, nome: "Nova Zelândia"},
        {id: 43995, nome: "Tchéquia"},
        {id: 44005, nome: "Uzbequistão"},
        {id: 44037, nome: "Bósnia e Herzegovina"},
        {id: 43817, nome: "RI do Irã"},
        {id: 43818, nome: "Iraque"},
        {id: 43819, nome: "Japão"},
        {id: 43820, nome: "Jordânia"},
        {id: 43822, nome: "República da Coreia"},
        {id: 43834, nome: "Catar"},
        {id: 43835, nome: "Arábia Saudita"},
        {id: 43843, nome: "Argélia"},
        {id: 43850, nome: "Cabo Verde"},
        {id: 43854, nome: "Costa do Marfim"},
        {id: 43855, nome: "Egito"},
        {id: 43860, nome: "Gana"},
        {id: 43872, nome: "Marrocos"},
        {id: 43879, nome: "Senegal"}
    ];

    async function fetchSquad(teamId) {
        const url = `https://api.fifa.com/api/v3/teams/${teamId}/squad?idCompetition=17&idSeason=285023&language=pt`;
        try {
            const response = await fetch(url);
            if (!response.ok) return null;
            return await response.json();
        } catch (error) {
            console.error(`Erro ao buscar time ${teamId}:`, error);
            return null;
        }
    }

    function createPlayerCard(player) {
        const name = player.PlayerName[0]?.Description || "Desconhecido";
        const position = player.PositionLocalized[0]?.Description || "N/A";
        const jersey = player.JerseyNum || "-";
        
        // Tenta pegar a foto, se não houver usa um placeholder
        const photoUrl = player.PictureUrl || (player.PlayerPicture && player.PlayerPicture.PictureUrl) || 'https://digitalhub.fifa.com/transform/5826694e-76f5-4700-a612-a70d62d29b00/Generic-Player-Silhouette-6?io=transform:fill,height:100,width:100';

        return `
            <div class="player-card">
                <img class="player-photo" src="${photoUrl}" alt="${name}" onerror="this.src='https://via.placeholder.com/100?text=No+Photo'">
                <span class="player-name">${name}</span>
                <div class="player-info">
                    #${jersey} - ${position}
                </div>
            </div>
        `;
    }

    async function loadAllTeams() {
        content.innerHTML = '<div class="loader">Carregando seleções e elencos...</div>';
        
        for (const selecao of selecoes) {
            const data = await fetchSquad(selecao.id);
            
            if (data && data.Players) {
                const teamSection = document.createElement('div');
                teamSection.className = 'team-section';
                
                const playersHtml = data.Players.map(p => createPlayerCard(p)).join('');
                
                teamSection.innerHTML = `
                    <div class="team-header" onclick="this.nextElementSibling.classList.toggle('active')">
                        <h2>${selecao.nome}</h2>
                        <span>📂 Clique para abrir/fechar</span>
                    </div>
                    <div class="player-grid">
                        ${playersHtml}
                    </div>
                `;
                
                content.appendChild(teamSection);
            }
        }
        
        const loader = document.querySelector('.loader');
        if (loader) loader.remove();
    }

    loadBtn.addEventListener('click', () => {
        loadBtn.disabled = true;
        loadBtn.innerText = "Carregando...";
        loadAllTeams();
    });
</script>

</body>
</html>
